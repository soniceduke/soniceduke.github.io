<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 가우스 반 · 탐험 가이드</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2c2416;
  --ink-light: #6b5d4f;
  --ink-faint: #a89882;
  --paper: #faf6ef;
  --paper-warm: #f5efe4;
  --card: #ffffff;
  --orange: #e8772e;
  --orange-soft: #fef0e4;
  --blue: #3a86c8;
  --blue-soft: #e8f2fc;
  --green: #2d8659;
  --green-soft: #e4f5ec;
  --purple: #7c5cbf;
  --purple-soft: #f0eafa;
  --coral: #e25b45;
  --coral-soft: #fce8e5;
  --gold: #d4a72c;
  --gold-soft: #fdf6de;
  --teal: #1a9b8a;
  --teal-soft: #e0f5f2;
  --border: #e8e0d4;
  --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
  --shadow: 0 4px 20px rgba(44,36,22,0.07);
  --shadow-lg: 0 12px 40px rgba(44,36,22,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--paper);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

/* ── HERO ── */
.hero {
  text-align: center;
  padding: 4rem 1rem 2.5rem;
  position: relative;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 320px;
  background: linear-gradient(180deg, var(--orange-soft) 0%, var(--paper) 100%);
  z-index: -1;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 100px;
  padding: 0.4rem 1.2rem;
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--ink-light);
  margin-bottom: 1.2rem;
  box-shadow: var(--shadow-sm);
}
.hero h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(1.8rem, 4.5vw, 2.8rem);
  font-weight: 700;
  line-height: 1.35;
  color: var(--ink);
  margin-bottom: 0.8rem;
}
.hero h1 .accent { color: var(--orange); }
.subtitle {
  font-size: 0.95rem;
  color: var(--ink-light);
  font-weight: 400;
  line-height: 1.6;
  max-width: 480px;
  margin: 0 auto 1.5rem;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 2rem;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.2rem;
}
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--orange);
}
.stat-label {
  font-size: 0.72rem;
  color: var(--ink-faint);
  letter-spacing: 0.03em;
}

/* ── PROGRESS ── */
.progress-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem 1.5rem;
  margin-bottom: 2rem;
  box-shadow: var(--shadow-sm);
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.7rem;
}
.progress-label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink);
}
.progress-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--orange);
  font-weight: 600;
}
.progress-bar {
  height: 8px;
  background: var(--paper-warm);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--gold));
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
}

/* ── SECTION LABEL ── */
.section-label {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1.2rem;
  font-size: 0.75rem;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── WEEK CARDS ── */
.weeks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
  margin-bottom: 3rem;
}

.week-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.4rem;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
  overflow: hidden;
}
.week-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 2px 0 0 2px;
  transition: opacity 0.3s;
}

/* Ready state */
.week-card.is-ready {
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.week-card.is-ready:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--orange);
}
.week-card.is-ready::before {
  background: var(--orange);
  opacity: 1;
}

/* Locked / Soon state */
.week-card.is-locked {
  opacity: 0.55;
}
.week-card.is-locked::before {
  background: var(--border);
  opacity: 0.5;
}
.week-card.is-soon {
  opacity: 0.7;
  box-shadow: var(--shadow-sm);
}
.week-card.is-soon::before {
  background: var(--blue);
  opacity: 0.6;
}

/* Card internals */
.card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.8rem;
}
.card-emoji {
  font-size: 2rem;
  line-height: 1;
  filter: grayscale(0);
  transition: transform 0.3s;
}
.week-card.is-ready:hover .card-emoji {
  transform: scale(1.15) rotate(-5deg);
}
.week-card.is-locked .card-emoji {
  filter: grayscale(0.6);
}

.card-badges {
  display: flex;
  gap: 0.35rem;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.badge {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.badge-week {
  background: var(--paper-warm);
  color: var(--ink-light);
}
.badge-hours {
  background: var(--paper-warm);
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
}
.badge-ready {
  background: var(--green-soft);
  color: var(--green);
}
.badge-soon {
  background: var(--blue-soft);
  color: var(--blue);
}
.badge-locked {
  background: var(--paper-warm);
  color: var(--ink-faint);
}

.card-date {
  font-size: 0.75rem;
  color: var(--ink-faint);
  margin-bottom: 0.3rem;
  font-family: 'JetBrains Mono', monospace;
}
.card-title {
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 0.5rem;
  color: var(--ink);
}
.card-desc {
  font-size: 0.82rem;
  color: var(--ink-light);
  line-height: 1.65;
  margin-bottom: 0.8rem;
  flex: 1;
}
.card-tags {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.68rem;
  padding: 0.2rem 0.6rem;
  border-radius: 6px;
  background: var(--paper-warm);
  color: var(--ink-faint);
  font-weight: 500;
}

/* Color accents per card */
.week-card[data-color="orange"].is-ready::before { background: var(--orange); }
.week-card[data-color="blue"].is-ready::before { background: var(--blue); }
.week-card[data-color="green"].is-ready::before { background: var(--green); }
.week-card[data-color="purple"].is-ready::before { background: var(--purple); }
.week-card[data-color="coral"].is-ready::before { background: var(--coral); }
.week-card[data-color="teal"].is-ready::before { background: var(--teal); }
.week-card[data-color="gold"].is-ready::before { background: var(--gold); }

.week-card[data-color="orange"].is-ready:hover { border-color: var(--orange); }
.week-card[data-color="blue"].is-ready:hover { border-color: var(--blue); }
.week-card[data-color="green"].is-ready:hover { border-color: var(--green); }
.week-card[data-color="purple"].is-ready:hover { border-color: var(--purple); }
.week-card[data-color="coral"].is-ready:hover { border-color: var(--coral); }
.week-card[data-color="teal"].is-ready:hover { border-color: var(--teal); }
.week-card[data-color="gold"].is-ready:hover { border-color: var(--gold); }

/* Ready card glow on hover */
.card-go {
  display: none;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--orange);
  margin-top: 0.5rem;
}
.card-go::after {
  content: '→';
  transition: transform 0.2s;
}
.week-card.is-ready .card-go { display: flex; }
.week-card.is-ready:hover .card-go::after { transform: translateX(4px); }

/* ── FOOTER ── */
.site-footer {
  text-align: center;
  padding: 2rem 1rem 3rem;
  border-top: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--ink-faint);
  line-height: 1.8;
}
.site-footer a {
  color: var(--orange);
  text-decoration: none;
}

/* ── ENTRANCE ANIMATION ── */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.week-card {
  animation: cardIn 0.5s ease both;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .weeks-grid {
    grid-template-columns: 1fr;
  }
  .hero { padding: 3rem 0.5rem 2rem; }
  .hero-stats { gap: 1.2rem; }
  .stat-num { font-size: 1.3rem; }
}
</style>
</head>

  const isReady = w.status === 'ready';
  const el = document.createElement(isReady ? 'a' : 'div');

  if (isReady) el.href = `lectures/week-${String(w.week).padStart(2,'0')}.html`;

  el.className = `week-card ${isReady ? 'is-ready' : w.status === 'soon' ? 'is-soon' : 'is-locked'}`;
  el.dataset.color = w.color;
  el.style.animationDelay = `${delay * 0.06}s`;

  el.innerHTML = `
    <div class="card-top">
      <span class="card-emoji">${w.emoji}</span>
      <div class="card-badges">
        <span class="badge badge-week">${w.week}주차</span>
        <span class="badge badge-hours">${w.hours}h</span>
        <span class="badge ${st.cls}">${st.text}</span>
      </div>
    </div>
    <div class="card-date">${w.date}</div>
    <div class="card-title">${w.title}</div>
    <div class="card-desc">${w.desc}</div>
    <div class="card-tags">
      ${w.tags.map(t => `<span class="tag">${t}</span>`).join('')}
    </div>
    <div class="card-go">읽으러 가기</div>
  `;
  return el;
}

function render() {
  const readyGrid = document.getElementById('readyGrid');
  const soonGrid = document.getElementById('soonGrid');
  const lockedGrid = document.getElementById('lockedGrid');
  let readyCount = 0;
  let di = 0;

  weeks.forEach(w => {
    if (w.status === 'ready') {
      readyCount++;
      readyGrid.appendChild(makeCard(w, di++));
    } else if (w.status === 'soon') {
      soonGrid.appendChild(makeCard(w, di++));
    } else {
      lockedGrid.appendChild(makeCard(w, di++));
    }
  });

  document.getElementById('readyNum').textContent = readyCount;
  document.getElementById('progressText').textContent = `${readyCount} / ${weeks.length}`;
  document.getElementById('progressFill').style.width = `${(readyCount / weeks.length) * 100}%`;
}

render();
</script>
