<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 수·과융합영재원 — 가우스 반 학습 가이드</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="2026 수·과융합영재원 가우스 반 21주 커리큘럼 예습·복습·심화·상상 학습 가이드">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
</head>
<body>

<div class="container">

  <!-- Hero -->
  <section class="hero">
    <div class="hero-badge">2026학년도 · 가우스 반</div>
    <h1>수·과융합영재원<br>학습 가이드</h1>
    <p class="subtitle">예습 · 복습 · 심화 · 상상 — 진짜 학습을 위한 4단계 에세이</p>
    <div class="meta">
      <div class="meta-item">📅 <span>21주</span> 과정</div>
      <div class="meta-item">⏱ 총 <span>82시간</span></div>
      <div class="meta-item">📖 <span>4단계</span> 에세이</div>
    </div>
  </section>

  <!-- Progress -->
  <section class="progress-section" id="progress">
    <div class="progress-header">
      <span class="progress-label">학습 진행률</span>
      <span class="progress-count" id="progress-text">0 / 21주 완성</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </section>

  <!-- Week Cards -->
  <section class="weeks-grid" id="weeks-grid"></section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>초등 5학년 눈높이의 과학·수학 융합 학습 자료</p>
    <p style="margin-top:6px">📖 예습(10분) · 🔬 복습(10분) · 🚀 심화(12분) · 💭 상상(사고실험)</p>
    <p style="margin-top:12px; font-size:11px">
      Built with ❤️ for curious minds · 
      <a href="https://soniceduke.github.io" target="_blank">soniceduke.github.io</a>
    </p>
  </footer>

</div>

<script>
const weeks = [
  { week:1,  date:"4.4(토)",   hours:3, emoji:"🧭", title:"나의 성격과 과학윤리", desc:"과학하는 사람의 약속, 메타인지, 창의적 산출물 안내", tags:["과학윤리","메타인지","산출물"], status:"ready" },
  { week:2,  date:"4.11(토)",  hours:4, emoji:"💧", title:"물, 너는 누구니?", desc:"수소결합, 표면장력, 모세관현상, 물의 밀도 이상", tags:["화학","물리","생태계"], status:"soon" },
  { week:3,  date:"4.18(토)",  hours:4, emoji:"🌉", title:"트러스 구조", desc:"삼각형의 안정성, 힘의 분산, 좌굴, 생체모방공학", tags:["구조공학","수학","건축"], status:"soon" },
  { week:4,  date:"4.25(토)",  hours:4, emoji:"📡", title:"센서와 데이터로 움직임을 설계하다", desc:"ADC 변환, 피드백 루프, 통계 분석, IoT", tags:["센서","데이터","코딩"], status:"locked" },
  { week:5,  date:"5.9(토)",   hours:4, emoji:"🎲", title:"게임 이론과 내쉬 균형", desc:"죄수의 딜레마, 보수행렬, 혼합전략, 보드게임 설계", tags:["게임이론","확률","전략"], status:"locked" },
  { week:6,  date:"5.16(토)",  hours:4, emoji:"📐", title:"입체도형과 공간 감각", desc:"정다면체, 오일러 공식, 위상수학, 4차원", tags:["기하학","위상수학","공간"], status:"locked" },
  { week:7,  date:"5.30(토)",  hours:4, emoji:"🔐", title:"보안기술 속 수학", desc:"RSA 암호, 소수, 모듈러 연산, 타원곡선, 양자암호", tags:["암호학","소수","보안"], status:"locked" },
  { week:8,  date:"6.13(토)",  hours:4, emoji:"🔄", title:"뒤집고 돌리고 나만의 도형 세상", desc:"평행·대칭·회전이동, 테셀레이션, 벽지군, 에셔", tags:["변환","대칭","예술"], status:"locked" },
  { week:9,  date:"6.20(토)",  hours:4, emoji:"🧱", title:"블럭으로 탐구하는 STEAM 프로젝트", desc:"공학적 설계, 최적화, 무게중심, 실패 분석", tags:["STEAM","공학","설계"], status:"locked" },
  { week:10, date:"6.27(토)",  hours:4, emoji:"🔢", title:"경우의 수", desc:"순열·조합, 파스칼 삼각형, 비둘기집 원리, 조합 폭발", tags:["조합론","확률","논리"], status:"locked" },
  { week:11, date:"7.4(토)",   hours:4, emoji:"🥚", title:"달걀을 지켜라!", desc:"충격량, 운동량 보존, 종단속도, 에너지 흡수", tags:["물리","공학","설계"], status:"locked" },
  { week:12, date:"7.11(토)",  hours:4, emoji:"🌍", title:"지구의 미래 기후 예측하기", desc:"기후 모델, 되먹임 효과, 탄소 예산, 티핑포인트", tags:["환경","데이터","모델링"], status:"locked" },
  { week:13, date:"7.25(토)",  hours:4, emoji:"🌐", title:"코스페이시스 메타버스 공간 설계", desc:"3D 좌표, 블록 코딩, 보로노이 다이어그램, VR", tags:["메타버스","코딩","3D"], status:"locked" },
  { week:14, date:"8.22(토)",  hours:4, emoji:"🤖", title:"햄스터봇과 떠나는 코딩 탐험", desc:"알고리즘 효율성, 유한상태기계, PID 제어", tags:["로봇","코딩","알고리즘"], status:"locked" },
  { week:15, date:"8.29(토)",  hours:4, emoji:"🎢", title:"롤러코스터의 비밀!", desc:"에너지 보존, G-force, 최속강하선, 사이클로이드", tags:["물리","에너지","곡선"], status:"locked" },
  { week:16, date:"9.5(토)",   hours:4, emoji:"⚙️", title:"롤링볼 장치와 힘의 원리", desc:"단순기계 6가지, 기계적 이점, 카오스 이론", tags:["역학","기계","카오스"], status:"locked" },
  { week:17, date:"9.12(토)",  hours:4, emoji:"🪐", title:"내 손 위에 우주", desc:"우주 거리 사다리, 케플러 법칙, 페르미 역설", tags:["천문학","척도","물리"], status:"locked" },
  { week:18, date:"9.19(토)",  hours:4, emoji:"🧩", title:"공감의 리더십 / 펜토미노", desc:"NP-완전, 대칭 분류, 폴리오미노, 리더십", tags:["퍼즐","리더십","조합"], status:"locked" },
  { week:19, date:"10.17(토)", hours:4, emoji:"🔺", title:"오토마타 / 프랙탈과 시에르핀스키", desc:"프랙탈 차원, L-시스템, 기구학, 캠 설계", tags:["프랙탈","오토마타","차원"], status:"locked" },
  { week:20, date:"10.24(토)", hours:4, emoji:"✈️", title:"종이비행기 / 환경 오염", desc:"양력, 레이놀즈 수, 환경 데이터 분석", tags:["비행","환경","데이터"], status:"locked" },
  { week:21, date:"10.31(토)", hours:3, emoji:"🎤", title:"산출물 발표회", desc:"과학적 소통, 데이터 시각화, 메타 학습", tags:["발표","정리","피어리뷰"], status:"locked" }
];

function getStatusLabel(s) {
  if (s === 'ready') return { text: '학습 가능', cls: 'ready' };
  if (s === 'soon') return { text: '준비 중', cls: 'soon' };
  return { text: '예정', cls: 'locked' };
}

function renderCards() {
  const grid = document.getElementById('weeks-grid');
  let readyCount = 0;

  weeks.forEach(w => {
    if (w.status === 'ready') readyCount++;

    const st = getStatusLabel(w.status);
    const isReady = w.status === 'ready';
    const card = document.createElement(isReady ? 'a' : 'div');
    
    if (isReady) card.href = `lectures/week-${String(w.week).padStart(2,'0')}.html`;
    card.className = `week-card ${isReady ? 'is-ready' : 'is-locked'}`;

    card.innerHTML = `
      <div class="card-top">
        <span class="card-emoji">${w.emoji}</span>
        <div class="card-badges">
          <span class="card-week">${w.week}주차</span>
          <span class="card-hours">${w.hours}h</span>
          <span class="card-status ${st.cls}">${st.text}</span>
        </div>
      </div>
      <div class="card-date">${w.date}</div>
      <div class="card-title">${w.title}</div>
      <div class="card-desc">${w.desc}</div>
      <div class="card-footer">
        ${w.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });

  // Update progress
  document.getElementById('progress-text').textContent = `${readyCount} / ${weeks.length}주 완성`;
  document.getElementById('progress-fill').style.width = `${(readyCount / weeks.length) * 100}%`;
}

renderCards();
</script>

</body>
</html>
